{% extends "base.html" %}
{% block title %}Request Access — SkillMatch Pro{% endblock %}

{% block fullpage %}
<div class="auth-wrapper">
    <div class="auth-container">
        <div class="auth-logo">
            <div class="logo-icon"><i class="fas fa-bolt"></i></div>
            <span class="logo-text">SkillMatch<span class="logo-accent">Pro</span></span>
        </div>
        <div class="auth-card">
            <h2 class="auth-title">Request Access</h2>
            <p class="auth-subtitle">Create your account — a manager will approve it</p>

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">First Name</label>
                        <input type="text" name="first_name" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Last Name</label>
                        <input type="text" name="last_name" placeholder="Doe" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" placeholder="john.doe@company.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" placeholder="At least 6 characters" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" name="confirm_password" placeholder="Re-enter password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:8px;">
                    <i class="fas fa-user-plus"></i> Request Access
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="{{ url_for('auth.login') }}" class="auth-link">Sign In</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
