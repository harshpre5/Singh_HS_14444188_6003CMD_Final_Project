{% extends "base.html" %}
{% block title %}Sign In — SkillMatch Pro{% endblock %}

{% block fullpage %}
<div class="auth-wrapper">
    <div class="auth-container">
        <div class="auth-logo">
            <div class="logo-icon"><i class="fas fa-bolt"></i></div>
            <span class="logo-text">SkillMatch<span class="logo-accent">Pro</span></span>
        </div>
        <div class="auth-card">
            <h2 class="auth-title">Welcome back</h2>
            <p class="auth-subtitle">Sign in to your account to continue</p>

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" placeholder="you@skillmatch.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:8px;">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="{{ url_for('auth.register') }}" class="auth-link">Request Access</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
